<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兒童學習樂園</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 700px;
    width: 100%;
    padding: 30px 25px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  h1 {
    color: #ff6b6b;
    font-size: 2em;
    margin-bottom: 5px;
    text-shadow: 2px 2px 0 #feca57;
  }
  .subtitle {
    color: #666;
    font-size: 1em;
    margin-bottom: 20px;
  }
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f0f0ff;
    border-radius: 50px;
    padding: 10px 20px;
    margin-bottom: 20px;
    font-size: 1.1em;
  }
  .score, .question-num {
    font-weight: bold;
    color: #5f27cd;
  }
  .question-area {
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .question-text {
    font-size: 1.5em;
    font-weight: bold;
    color: #333;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .emoji-display {
    font-size: 3.5em;
    margin: 10px 0;
    letter-spacing: 8px;
    line-height: 1.4;
    min-height: 120px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  .options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 450px;
    margin: 15px 0;
  }
  .option-btn {
    padding: 18px 10px;
    font-size: 1.5em;
    font-weight: bold;
    border: 3px solid #ddd;
    border-radius: 20px;
    background: white;
    cursor: pointer;
    transition: all 0.2s;
    color: #333;
  }
  .option-btn:hover { transform: scale(1.05); border-color: #5f27cd; }
  .option-btn:active { transform: scale(0.95); }
  .option-btn.correct {
    background: #2ecc71 !important;
    color: white !important;
    border-color: #27ae60 !important;
  }
  .option-btn.wrong {
    background: #ff6b6b !important;
    color: white !important;
    border-color: #ee5a24 !important;
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .feedback {
    font-size: 1.8em;
    min-height: 60px;
    margin: 5px 0;
  }
  .next-btn {
    padding: 15px 45px;
    font-size: 1.3em;
    font-weight: bold;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s;
    display: none;
    margin-top: 10px;
  }
  .next-btn:hover { transform: scale(1.05); }
  .game-select {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .game-btn {
    padding: 12px 24px;
    font-size: 1.1em;
    font-weight: bold;
    border: 3px solid #ddd;
    border-radius: 50px;
    background: white;
    cursor: pointer;
    transition: all 0.2s;
  }
  .game-btn.active {
    background: #5f27cd;
    color: white;
    border-color: #5f27cd;
  }
  .game-btn:hover { border-color: #5f27cd; }
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  .result-screen .big {
    font-size: 4em;
  }
  .result-screen h2 {
    font-size: 2em;
    color: #5f27cd;
  }
  .result-screen p {
    font-size: 1.3em;
    color: #555;
    line-height: 1.6;
  }
  .restart-btn {
    padding: 15px 45px;
    font-size: 1.2em;
    font-weight: bold;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .restart-btn:hover { transform: scale(1.05); }
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
  .hint {
    font-size: 0.9em;
    color: #999;
    margin-top: 5px;
  }
</style>
</head>
<body>

<div class="container" id="app">
  <h1>🎮 兒童學習樂園</h1>
  <p class="subtitle">一起快樂學習吧！</p>

  <div class="game-select" id="gameSelect">
    <button class="game-btn active" data-game="count">🔢 數數字</button>
    <button class="game-btn" data-game="add">➕ 加法</button>
    <button class="game-btn" data-game="animal">🐶 認動物</button>
  </div>

  <div class="score-bar">
    <span class="score">🏆 得分: <span id="scoreDisplay">0</span></span>
    <span class="question-num">📝 第 <span id="qNum">1</span>/<span id="qTotal">10</span> 題</span>
  </div>

  <div class="question-area" id="questionArea">
    <div class="question-text" id="questionText">點選下面開始</div>
    <div class="emoji-display" id="emojiDisplay"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">下一題 ➜</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="big">🎉</div>
    <h2>太棒了！</h2>
    <p id="resultMessage">你答對了 10 題中的 10 題！</p>
    <button class="restart-btn" id="restartBtn">🔄 再玩一次</button>
  </div>
</div>

<script>
const GAMES = {
  count: {
    name: '數數字',
    generate() {
      const num = Math.floor(Math.random() * 9) + 2;
      const emojis = ['🍎','⭐','🌈','🌸','🐱','🐶','🍕','🎈','🚗','❤️'];
      const e = emojis[Math.floor(Math.random() * emojis.length)];
      const display = e.repeat(num);
      const answer = num;
      const wrongs = [];
      while (wrongs.length < 3) {
        const w = answer + (Math.floor(Math.random() * 5) + 1) * (Math.random() < 0.5 ? 1 : -1);
        if (w !== answer && w > 1 && w < 15 && !wrongs.includes(w)) wrongs.push(w);
      }
      const opts = [answer, ...wrongs].sort(() => Math.random() - 0.5);
      return { question: '這裡有幾個？', display, answer, opts };
    }
  },
  add: {
    name: '加法',
    generate() {
      const a = Math.floor(Math.random() * 9) + 1;
      const b = Math.floor(Math.random() * 9) + 1;
      const answer = a + b;
      const display = '🍎'.repeat(a) + ' + ' + '🍎'.repeat(b);
      const wrongs = [];
      while (wrongs.length < 3) {
        const w = answer + (Math.floor(Math.random() * 5) + 1) * (Math.random() < 0.5 ? 1 : -1);
        if (w !== answer && w > 1 && w < 20 && !wrongs.includes(w)) wrongs.push(w);
      }
      const opts = [answer, ...wrongs].sort(() => Math.random() - 0.5);
      return { question: `${a} + ${b} = ？`, display, answer, opts };
    }
  },
  animal: {
    name: '認動物',
    data: [
      { emoji: '🐶', name: '小狗' }, { emoji: '🐱', name: '小貓' },
      { emoji: '🐰', name: '兔子' }, { emoji: '🐼', name: '熊貓' },
      { emoji: '🐮', name: '乳牛' }, { emoji: '🐷', name: '小豬' },
      { emoji: '🐸', name: '青蛙' }, { emoji: '🦊', name: '狐狸' },
      { emoji: '🐯', name: '老虎' }, { emoji: '🦁', name: '獅子' },
    ],
    generate() {
      const idx = Math.floor(Math.random() * this.data.length);
      const correct = this.data[idx];
      const others = this.data.filter((_, i) => i !== idx);
      const wrongs = [];
      while (wrongs.length < 3) {
        const o = others[Math.floor(Math.random() * others.length)];
        if (!wrongs.includes(o.name)) wrongs.push(o.name);
      }
      const opts = [correct.name, ...wrongs].sort(() => Math.random() - 0.5);
      return { question: '這是什麼動物？', display: correct.emoji, answer: correct.name, opts };
    }
  }
};

const TOTAL = 10;
let gameType = 'count';
let questions = [];
let currentQ = 0;
let score = 0;
let answered = false;
let correctCount = 0;

const $ = id => document.getElementById(id);
const scoreDisplay = $('scoreDisplay');
const qNum = $('qNum');
const qTotal = $('qTotal');
const questionText = $('questionText');
const emojiDisplay = $('emojiDisplay');
const optionsContainer = $('optionsContainer');
const feedback = $('feedback');
const nextBtn = $('nextBtn');
const resultScreen = $('resultScreen');
const questionArea = $('questionArea');
const resultMessage = $('resultMessage');
const restartBtn = $('restartBtn');
const gameBtns = document.querySelectorAll('.game-btn');

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateQuestions() {
  const game = GAMES[gameType];
  questions = [];
  for (let i = 0; i < TOTAL; i++) {
    questions.push(game.generate());
  }
}

function startGame() {
  currentQ = 0;
  score = 0;
  correctCount = 0;
  answered = false;
  resultScreen.style.display = 'none';
  questionArea.style.display = 'flex';
  generateQuestions();
  qTotal.textContent = TOTAL;
  showQuestion();
}

function showQuestion() {
  answered = false;
  feedback.textContent = '';
  nextBtn.style.display = 'none';
  const q = questions[currentQ];
  qNum.textContent = currentQ + 1;
  scoreDisplay.textContent = score;
  questionText.textContent = q.question;
  emojiDisplay.textContent = q.display;

  optionsContainer.innerHTML = '';
  q.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.dataset.value = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, q.answer));
    optionsContainer.appendChild(btn);
  });
}

function handleAnswer(btn, selected, correct) {
  if (answered) return;
  answered = true;
  const allBtns = optionsContainer.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  if (selected == correct) {
    btn.classList.add('correct');
    score += 10;
    correctCount++;
    feedback.textContent = '✅ 答對了！好棒！';
    scoreDisplay.textContent = score;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.dataset.value == correct) b.classList.add('correct');
    });
    feedback.textContent = '❌ 再想想喔！';
  }
  nextBtn.style.display = 'inline-block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  questionArea.style.display = 'none';
  resultScreen.style.display = 'flex';
  let msg;
  let emoji;
  if (correctCount === TOTAL) {
    msg = '你是學習小天才！全部答對！🏆';
    emoji = '🌟';
    launchConfetti();
  } else if (correctCount >= 7) {
    msg = `你好厲害！答對了 ${correctCount} 題！繼續加油喔！`;
    emoji = '👏';
  } else if (correctCount >= 5) {
    msg = `不錯喔！答對了 ${correctCount} 題，再試一次會更好！`;
    emoji = '💪';
  } else {
    msg = `答對了 ${correctCount} 題，多多練習就會越來越棒！`;
    emoji = '🤗';
  }
  resultMessage.textContent = `你總共得到 ${score} 分！${msg}`;
}

function launchConfetti() {
  const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#2ecc71','#f368e0'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.width = (Math.random() * 8 + 4) + 'px';
    piece.style.height = (Math.random() * 8 + 4) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = (Math.random() * 2) + 's';
    el.appendChild(piece);
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

gameBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    gameBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    gameType = btn.dataset.game;
    startGame();
  });
});

nextBtn.addEventListener('click', nextQuestion);
restartBtn.addEventListener('click', startGame);

startGame();
</script>
</body>
</html>
